<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ale &amp; Kris — 28th August 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0604; touch-action: none; user-select: none; -webkit-user-select: none; }

    #rotate-prompt { display: none; position: fixed; inset: 0; z-index: 1000; background: #0e0604; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; padding: 2rem; }
    #rotate-prompt.visible { display: flex; }
    .rotate-icon { font-size: 3.5rem; animation: rotate-hint 2s ease-in-out infinite; }
    @keyframes rotate-hint { 0%,100%{transform:rotate(0deg)}40%,60%{transform:rotate(90deg)} }
    .rotate-text { font-family: Georgia, serif; font-size: 1rem; font-style: italic; color: #C9A84C; letter-spacing: 0.08em; line-height: 1.6; }

    #book-stage { position: fixed; inset: 0; overflow: hidden; }
    #track { display: flex; height: 100%; }

    .spread { min-width: 100vw; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; background: #0e0604; }
    .spread img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; pointer-events: none; }
    .spread::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.18) 0%, transparent 6%, transparent 94%, rgba(0,0,0,0.18) 100%); pointer-events: none; }

    .rsvp-overlay { position: absolute; right: 4%; bottom: 14%; z-index: 10; }
    .rsvp-btn { display: block; padding: 0.65rem 1.8rem; background: #5B1A2A; color: #FAF6F0; font-family: Georgia, serif; font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; text-decoration: none; border: 1px solid #C9A84C; }

    .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); z-index: 50; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); border-radius: 50%; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(4px); }
    .nav-arrow:hover { background: rgba(201,168,76,0.3); }
    .nav-arrow.hidden { opacity: 0; pointer-events: none; }
    #prev-btn { left: 12px; } #next-btn { right: 12px; }
    .nav-arrow svg { width: 18px; height: 18px; stroke: #C9A84C; fill: none; stroke-width: 2; }

    #page-indicator { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 50; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(201,168,76,0.3); border: 1px solid rgba(201,168,76,0.5); transition: all 0.3s; cursor: pointer; }
    .dot.active { background: #C9A84C; transform: scale(1.3); }

    #hint { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); font-family: Georgia, serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(201,168,76,0.5); z-index: 50; animation: fade-hint 3s ease-out forwards; white-space: nowrap; }
    @keyframes fade-hint { 0%{opacity:0}20%,80%{opacity:1}100%{opacity:0} }
    #fullscreen-btn { position: fixed; top: 12px; right: 12px; z-index: 50; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.35); border-radius: 50%; cursor: pointer; }
    #fullscreen-btn svg { width: 16px; height: 16px; stroke: rgba(201,168,76,0.7); fill: none; stroke-width: 2; }
    #home-btn { position: fixed; top: 12px; left: 12px; z-index: 50; font-family: Georgia, serif; font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(201,168,76,0.55); text-decoration: none; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.25); padding: 0.4rem 0.8rem; }

    /* ── FOLD OVERLAY ── */
    #fold-wrapper { position: fixed; inset: 0; z-index: 200; display: none; background: #0e0604; }

    /* Target page sits behind everything */
    #fold-reveal { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #fold-reveal img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; pointer-events: none; }
    #fold-reveal::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right,rgba(0,0,0,0.18) 0%,transparent 6%,transparent 94%,rgba(0,0,0,0.18) 100%); pointer-events: none; }

    /*
      Key insight: both halves are the SAME image at IDENTICAL position/size.
      clip-path splits them cleanly at exactly 50% — no offset arithmetic, no seam.
      The folding half uses transform-origin:50% 50% so the pivot = screen centre.
    */
    .fold-half {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .fold-half img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    #fold-static { z-index: 1; }
    #fold-moving { z-index: 2; transform-origin: 50% 50%; will-change: transform; }

    /* Crease shadow at spine (screen centre) */
    #fold-crease {
      position: absolute; top: 0; height: 100%; width: 60px;
      pointer-events: none; opacity: 0; z-index: 3;
    }
    /* Shadow cast onto revealed page */
    #fold-shadow {
      position: absolute; top: 0; height: 100%; width: 90px;
      pointer-events: none; opacity: 0; z-index: 1;
    }

    /* ToC hotspot overlay */
    .toc-hotspots {
      position: absolute; inset: 0; pointer-events: none;
    }
    .toc-link {
      position: absolute;
      left: 50%; width: 48%;   /* right page only */
      display: block;
      pointer-events: all;
      cursor: pointer;
      /* Debug: uncomment below to visualise hotspots */
      /* background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.5); */
    }
    .toc-link:hover { background: rgba(201,168,76,0.12); border-radius: 2px; }
  </style>
</head>
<body>

<div id="rotate-prompt">
  <div class="rotate-icon">📖</div>
  <p class="rotate-text">Rotate your phone to landscape<br>for the full book experience<br><br><small style="font-size:0.75em;opacity:0.7;">Tap here if it doesn't open automatically</small></p>
</div>

<div id="book-stage">
  <div id="track">
    <div class="spread"><img src="images/hero.jpg"       alt="Ale &amp; Kris — Cover" /></div>
    <div class="spread"><img src="images/book-intro.jpg" alt="Welcome &amp; Table of Contents" />
    <div class="toc-hotspots">
      <a href="#" data-page="3" class="toc-link" title="Chapter I — The Wedding" style="top:16.0%;height:7%;"></a>
      <a href="#" data-page="4" class="toc-link" title="Chapter II — Access & Arrival" style="top:26.0%;height:7%;"></a>
      <a href="#" data-page="5" class="toc-link" title="Chapter III — The Weekend" style="top:36.0%;height:7%;"></a>
      <a href="#" data-page="6" class="toc-link" title="Chapter IV — The Celebration" style="top:46.0%;height:7%;"></a>
      <a href="#" data-page="6" class="toc-link" title="Chapter V — Practical Details" style="top:55.0%;height:7%;"></a>
      <a href="#" data-page="6" class="toc-link" title="Chapter VI — RSVP" style="top:65.0%;height:7%;"></a>
      <a href="#" data-page="7" class="toc-link" title="Chapter VII — Seating & Menu" style="top:74.0%;height:7%;"></a>
      <a href="#" data-page="8" class="toc-link" title="Chapter VIII — Accommodation" style="top:82.5%;height:7%;"></a>
    </div>
    </div>
    <div class="spread"><img src="images/book-story.jpg" alt="The Couple's Story" /></div>
    <div class="spread"><img src="images/book-ch1.jpg"   alt="Chapter I — The Wedding" /></div>
    <div class="spread"><img src="images/book-ch2.jpg"   alt="Chapter II — How to Get There" /></div>
    <div class="spread"><img src="images/book-ch3.jpg"   alt="Chapter III — The Weekend" /></div>
    <div class="spread">
      <img src="images/book-ch4.jpg" alt="Chapter IV — The Day &amp; RSVP" />
      <div class="rsvp-overlay"><a href="rsvp.html" class="rsvp-btn">RSVP →</a></div>
    </div>
    <div class="spread"><img src="images/book-ch5.jpg"   alt="Chapter VII — Table Plan &amp; Menu" /></div>
    <div class="spread"><img src="images/book-ch6.jpg"   alt="Chapter VIII — Accommodation &amp; Tips" /></div>
  </div>
</div>

<div id="fold-wrapper">
  <div id="fold-reveal"><img id="fold-reveal-img" alt="" /></div>
  <!-- Static half: clip-path set in JS -->
  <div class="fold-half" id="fold-static">
    <img id="fold-static-img" alt="" />
  </div>
  <!-- Folding half: clip-path + transform set in JS -->
  <div class="fold-half" id="fold-moving">
    <img id="fold-moving-img" alt="" />
    <div id="fold-crease"></div>
  </div>
  <div id="fold-shadow"></div>
</div>

<button class="nav-arrow hidden" id="prev-btn"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>
<button class="nav-arrow" id="next-btn"><svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></button>
<div id="page-indicator"></div>
<div id="hint">swipe to turn the page</div>
<button id="fullscreen-btn" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
<a href="index.html" id="home-btn">≡ Menu</a>

<script>
  const TOTAL = 9;
  const track     = document.getElementById('track');
  const prevBtn   = document.getElementById('prev-btn');
  const nextBtn   = document.getElementById('next-btn');
  const indicator = document.getElementById('page-indicator');
  let current = 0;

  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goToAnimated(i));
    indicator.appendChild(d);
  }

  function updateUI() {
    document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === current));
    prevBtn.classList.toggle('hidden', current === 0);
    nextBtn.classList.toggle('hidden', current === TOTAL - 1);
  }

  function goToInstant(n) {
    if (n < 0 || n >= TOTAL) return;
    resetZoom(getCurrentImg());
    current = n;
    track.style.transform = `translateX(-${current * 100}vw)`;
    updateUI();
  }

  function goToAnimated(n) {
    if (n < 0 || n >= TOTAL || foldAnimating) return;
    if (Math.abs(n - current) === 1 && initFold(n > current ? 1 : -1)) {
      completeFold();
    } else {
      goToInstant(n);
    }
  }

  prevBtn.addEventListener('click', () => goToAnimated(current - 1));
  nextBtn.addEventListener('click', () => goToAnimated(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goToAnimated(current + 1);
    if (e.key === 'ArrowLeft')  goToAnimated(current - 1);
  });

  // ── ZOOM ──
  let scale = 1, lastScale = 1, panX = 0, panY = 0, zoomed = false;
  function getCurrentImg() { return document.querySelectorAll('.spread')[current]?.querySelector('img'); }
  function applyTransform(img) {
    if (!img) return;
    img.style.transition = 'none';
    img.style.transformOrigin = 'center center';
    img.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  }
  function resetZoom(img) {
    scale = 1; lastScale = 1; panX = 0; panY = 0; zoomed = false;
    if (img) { img.style.transform = ''; img.style.transition = 'transform 0.25s ease'; }
  }
  function clampPan() {
    const img = getCurrentImg(); if (!img) return;
    const mx = Math.max(0,(img.clientWidth*scale  - window.innerWidth) /2);
    const my = Math.max(0,(img.clientHeight*scale - window.innerHeight)/2);
    panX = Math.max(-mx, Math.min(mx, panX));
    panY = Math.max(-my, Math.min(my, panY));
  }
  function touchDist(t) { return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }

  // ── HALF-FOLD ──
  const foldWrapper   = document.getElementById('fold-wrapper');
  const foldRevealImg = document.getElementById('fold-reveal-img');
  const foldStatic    = document.getElementById('fold-static');
  const foldStaticImg = document.getElementById('fold-static-img');
  const foldMoving    = document.getElementById('fold-moving');
  const foldMovingImg = document.getElementById('fold-moving-img');
  const foldCrease    = document.getElementById('fold-crease');
  const foldShadow    = document.getElementById('fold-shadow');

  let foldDir = 0, foldAnimating = false, foldInProgress = false;

  function getSrc(idx) { return document.querySelectorAll('.spread img')[idx]?.src || ''; }

  function initFold(dir) {
    const target = current + dir;
    if (target < 0 || target >= TOTAL || foldAnimating) return false;
    foldDir = dir;

    const curSrc = getSrc(current);
    const tgtSrc = getSrc(target);

    // All three images: same-sized, object-fit:contain — guaranteed identical rendering
    foldStaticImg.src  = curSrc;
    foldMovingImg.src  = curSrc;
    foldRevealImg.src  = tgtSrc;

    if (dir === 1) {
      // Forward: RIGHT half folds — hinge at screen centre (50%)
      // Static shows left half; moving shows right half, pivots from its left edge = 50% of viewport
      foldStatic.style.clipPath  = 'inset(0 50% 0 0)';           // left half visible
      foldMoving.style.clipPath  = 'inset(0 0 0 50%)';           // right half visible
      foldMoving.style.transformOrigin = '50% 50%';              // pivot = screen centre

      // Crease sits at screen centre on the left edge of the moving panel
      foldCrease.style.cssText = `
        position:absolute; top:0; height:100%; width:60px;
        left:calc(50% - 60px);
        background:linear-gradient(to right, rgba(0,0,0,0.75), transparent);
        pointer-events:none; opacity:0;`;

      // Shadow falls rightward from the spine
      foldShadow.style.cssText = `
        position:absolute; top:0; height:100%; width:90px;
        left:50%; z-index:1;
        background:linear-gradient(to right, rgba(0,0,0,0.5), transparent);
        pointer-events:none; opacity:0;`;
    } else {
      // Backward: LEFT half folds — hinge at screen centre
      foldStatic.style.clipPath  = 'inset(0 0 0 50%)';           // right half visible
      foldMoving.style.clipPath  = 'inset(0 50% 0 0)';           // left half visible
      foldMoving.style.transformOrigin = '50% 50%';              // pivot = screen centre

      // Crease at screen centre on the right edge of the moving panel
      foldCrease.style.cssText = `
        position:absolute; top:0; height:100%; width:60px;
        left:50%;
        background:linear-gradient(to left, rgba(0,0,0,0.75), transparent);
        pointer-events:none; opacity:0;`;

      // Shadow falls leftward from the spine
      foldShadow.style.cssText = `
        position:absolute; top:0; height:100%; width:90px;
        right:50%; left:auto; z-index:1;
        background:linear-gradient(to left, rgba(0,0,0,0.5), transparent);
        pointer-events:none; opacity:0;`;
    }

    // Reset before animation
    foldMoving.style.transition = 'none';
    foldMoving.style.transform  = 'perspective(1600px) rotateY(0deg)';
    foldCrease.style.opacity    = '0';
    foldShadow.style.opacity    = '0';

    foldWrapper.style.display = 'block';
    foldInProgress = true;
    return true;
  }

  function setFoldProgress(p) {
    // p: 0 (flat) → 1 (edge-on, 90°)
    const angle = p * 90;
    foldMoving.style.transition = 'none';
    foldMoving.style.transform  = foldDir === 1
      ? `perspective(1600px) rotateY(-${angle}deg)`
      : `perspective(1600px) rotateY(${angle}deg)`;
    const s = Math.sin(p * Math.PI / 2);
    foldCrease.style.opacity = (s * 0.95).toFixed(3);
    foldShadow.style.opacity = (s * 0.55).toFixed(3);
  }

  function completeFold() {
    if (!foldInProgress) return;
    foldAnimating = true;
    foldMoving.style.transition = 'transform 0.22s cubic-bezier(0.4,0,1,1)';
    foldMoving.style.transform  = foldDir === 1
      ? 'perspective(1600px) rotateY(-90deg)'
      : 'perspective(1600px) rotateY(90deg)';
    foldCrease.style.opacity = '0.95';
    foldShadow.style.opacity = '0.55';
    setTimeout(() => {
      foldWrapper.style.display = 'none';
      foldInProgress = false; foldAnimating = false;
      goToInstant(current + foldDir);
    }, 220);
  }

  function cancelFold() {
    if (!foldInProgress) return;
    foldAnimating = true;
    foldMoving.style.transition = 'transform 0.18s cubic-bezier(0.2,0,0.4,1)';
    foldMoving.style.transform  = 'perspective(1600px) rotateY(0deg)';
    foldCrease.style.opacity = '0';
    foldShadow.style.opacity = '0';
    setTimeout(() => {
      foldWrapper.style.display = 'none';
      foldInProgress = false; foldAnimating = false;
    }, 180);
  }

  // ── TOUCH ──
  let touchState = 'idle', pinchStartDist = 0;
  let panStartX = 0, panStartY = 0;
  let swipeStartX = 0, swipeCurrentX = 0, swipeDirLocked = false;
  let lastTap = 0;

  function foldP(dx) { return Math.min(1, Math.abs(dx) / (window.innerWidth * 0.5)); }

  document.addEventListener('touchstart', e => {
    if (foldAnimating) return;
    if (e.touches.length === 2) {
      if (foldInProgress) cancelFold();
      touchState = 'pinching';
      pinchStartDist = touchDist(e.touches);
      lastScale = scale;
    } else if (e.touches.length === 1) {
      if (zoomed) {
        touchState = 'panning';
        panStartX = e.touches[0].clientX - panX;
        panStartY = e.touches[0].clientY - panY;
      } else {
        touchState = 'swiping';
        swipeStartX = swipeCurrentX = e.touches[0].clientX;
        swipeDirLocked = false;
      }
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (foldAnimating) return;
    const img = getCurrentImg();

    if (touchState === 'pinching' && e.touches.length === 2) {
      e.preventDefault();
      scale = Math.min(5, Math.max(1, lastScale * (touchDist(e.touches) / pinchStartDist)));
      zoomed = scale > 1.05; clampPan(); applyTransform(img);

    } else if (touchState === 'panning' && e.touches.length === 1) {
      e.preventDefault();
      panX = e.touches[0].clientX - panStartX;
      panY = e.touches[0].clientY - panStartY;
      clampPan(); applyTransform(img);

    } else if (touchState === 'swiping' && e.touches.length === 1) {
      swipeCurrentX = e.touches[0].clientX;
      const dx = swipeCurrentX - swipeStartX;

      if (!swipeDirLocked && Math.abs(dx) > 8) {
        const dir = dx < 0 ? 1 : -1;
        const can = (dir === 1 && current < TOTAL-1) || (dir === -1 && current > 0);
        if (can) initFold(dir);
        swipeDirLocked = true;
      }
      if (foldInProgress) {
        e.preventDefault();
        setFoldProgress(foldP(dx));
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (foldAnimating) return;
    const img = getCurrentImg();

    if (touchState === 'pinching') {
      lastScale = scale;
      if (scale < 1.05) resetZoom(img);
      if (e.touches.length === 1 && zoomed) {
        touchState = 'panning';
        panStartX = e.touches[0].clientX - panX;
        panStartY = e.touches[0].clientY - panY;
      } else { touchState = 'idle'; }

    } else if (touchState === 'panning') {
      touchState = 'idle';

    } else if (touchState === 'swiping') {
      const dx = swipeCurrentX - swipeStartX;
      if (foldInProgress) {
        foldP(dx) > 0.28 ? completeFold() : cancelFold();
      }
      touchState = 'idle'; swipeDirLocked = false;
      if (Math.abs(dx) < 10) {
        const now = Date.now();
        if (now - lastTap < 280) {
          if (zoomed) resetZoom(img);
          else { scale = 2.5; lastScale = 2.5; zoomed = true; panX = 0; panY = 0; applyTransform(img); }
        }
        lastTap = now;
      }
    }
  }, { passive: true });

  // ── ORIENTATION ── (soft hint only, never blocks)
  const rp = document.getElementById('rotate-prompt'), bs = document.getElementById('book-stage');

  // Preload all images immediately
  ['images/hero.jpg','images/book-intro.jpg','images/book-story.jpg',
   'images/book-ch1.jpg','images/book-ch2.jpg','images/book-ch3.jpg',
   'images/book-ch4.jpg','images/book-ch5.jpg','images/book-ch6.jpg'
  ].forEach(src => { const i = new Image(); i.src = src; });

  // Show hint in portrait on mobile, auto-dismiss after 3s, tap to dismiss
  function checkOri() {
    const port = window.innerHeight > window.innerWidth;
    const mob  = 'ontouchstart' in window;
    if (port && mob) {
      rp.classList.add('visible');
      bs.style.visibility = 'visible'; // book still visible behind hint
      setTimeout(() => rp.classList.remove('visible'), 3000);
    } else {
      rp.classList.remove('visible');
    }
    try { screen.orientation.lock('landscape').catch(()=>{}); } catch(e) {}
  }
  rp.addEventListener('click', () => rp.classList.remove('visible'));
  window.addEventListener('resize', () => setTimeout(checkOri, 200));
  window.addEventListener('orientationchange', () => setTimeout(checkOri, 300));
  checkOri();

  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }

  track.style.transform = 'translateX(0vw)';
  updateUI();
  document.addEventListener('touchend', () => document.getElementById('hint')?.remove(), { once: true });
  // ── TOC HOTSPOT NAVIGATION ──
  document.querySelectorAll('.toc-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = parseInt(a.dataset.page);
      goToAnimated(target);
    });
  });

</script>
</body>
</html>
